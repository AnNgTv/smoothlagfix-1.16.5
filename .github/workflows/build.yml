name: Build and Release Mod

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get Version
        id: get_version
        run: echo "VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2 | xargs)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: SmoothLagFix 1.16.5 (Java 8 Compatible) - v${{ steps.get_version.outputs.VERSION }}
          body: |
            Bản build chính thức của SmoothLagFix cho Minecraft 1.16.5.
            - Hỗ trợ chạy trên **Java 8** và mới hơn.
            - Sửa lỗi `UnsupportedClassVersionError` khi chạy trên các launcher cũ.
          files: build/libs/*.jar
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
