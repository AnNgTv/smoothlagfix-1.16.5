name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Hỗ trợ đầy đủ các phiên bản Java phổ biến cho Minecraft
        java: [8, 11, 17, 21] 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          # Bỏ cache mặc định để tránh lỗi khi repo chưa có file Gradle/Maven

      # 1. Build với Gradle
      - name: Build with Gradle
        if: hashFiles('**/build.gradle*', '**/build.gradle.kts') != ''
        run: |
          chmod +x ./gradlew
          ./gradlew build

      # 2. Build với Maven
      - name: Build with Maven
        if: hashFiles('**/pom.xml') != ''
        run: mvn -B package --file pom.xml

      # 3. Gom file và đổi tên theo tên Repo (ví dụ: Eco.jar)
      - name: Prepare and Rename Artifacts
        id: prepare
        run: |
          mkdir -p final_artifacts
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          JAVA_VER=${{ matrix.java }}
          
          # Tìm file .jar
          FOUND_JAR=false
          find . -name "*.jar" -not -path "*/.*" -not -name "*-sources.jar" -not -name "*-javadoc.jar" -not -name "*-dev.jar" -type f | while read file; do
            NEW_NAME="${REPO_NAME}-Java${JAVA_VER}.jar"
            cp "$file" "final_artifacts/$NEW_NAME"
            echo "FOUND_JAR=true" >> $GITHUB_ENV
          done
          ls -R final_artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && env.FOUND_JAR == 'true'
        with:
          files: final_artifacts/*.jar
          body: "Tự động build cho Java ${{ matrix.java }}. Tên file: ${REPO_NAME}-Java${{ matrix.java }}.jar"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
